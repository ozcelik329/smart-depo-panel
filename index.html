<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Depo Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}
.full{
  grid-column:1/-1;
}
.alarm-active{
  background:#dc2626;
}
.alarm-normal{
  background:#16a34a;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.btn-on{
  background:#ef4444;
}
.btn-off{
  background:#22c55e;
}
</style>
</head>

<body>

<h1>📦 Smart Depo Kontrol Paneli</h1>

<div class="container">

<div class="card">
<h2>Sıcaklık</h2>
<p id="temp">--</p>
</div>

<div class="card">
<h2>Nem</h2>
<p id="hum">--</p>
</div>

<div class="card">
<h2>Mesafe</h2>
<p id="dist">--</p>
</div>

<div class="card">
<h2>Kapı Durumu</h2>
<p id="door">--</p>
</div>

<div id="alarmBox" class="card full alarm-normal">
DURUM NORMAL
</div>

<div class="card full">
<button id="alarmBtn" class="btn-off">Alarmı Aç</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm18AovKTAw0KB03ncpGaZFq4Uzhb8Lxc",
  authDomain: "smartdepo-1589d.firebaseapp.com",
  databaseURL: "https://smartdepo-1589d-default-rtdb.firebaseio.com",
  projectId: "smartdepo-1589d",
  storageBucket: "smartdepo-1589d.firebasestorage.app",
  messagingSenderId: "159218413152",
  appId: "1:159218413152:web:10df562752247ec8a0dd05"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const sensorRef = ref(db, "sensordata");

onValue(sensorRef, (snapshot) => {
 const data = snapshot.val();
 if(!data) return;

 document.getElementById("temp").innerText = data.temperature + " °C";
 document.getElementById("hum").innerText = data.humidity + " %";
 document.getElementById("dist").innerText = data.distance + " cm";
 document.getElementById("door").innerText = data.doorOpen ? "AÇIK" : "KAPALI";

 const box = document.getElementById("alarmBox");
 const btn = document.getElementById("alarmBtn");

 if(data.alarmActive){
   box.innerText="!!! ALARM AKTİF !!!";
   box.className="card full alarm-active";
 }else{
   box.innerText="DURUM NORMAL";
   box.className="card full alarm-normal";
 }

 btn.innerText = data.alarmEnabled ? "Alarmı Kapat" : "Alarmı Aç";
 btn.className = data.alarmEnabled ? "btn btn-on" : "btn btn-off";
});

document.getElementById("alarmBtn").addEventListener("click", () => {
  onValue(sensorRef, (snapshot) => {
    const current = snapshot.val().alarmEnabled;
    update(sensorRef, { alarmEnabled: !current });
  }, { onlyOnce: true });
});

</script>

</body>
</html>
