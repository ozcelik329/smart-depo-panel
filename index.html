<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Depo Panel</title>

<style>
:root {
 --bg:#0a0a0a;
 --card:#1c1c1e;
 --blue:#007aff;
 --red:#ff3b30;
 --green:#28cd41;
 --gray:#8e8e93;
}

body{font-family:-apple-system,sans-serif;background:var(--bg);color:white;margin:0;}
.header{padding:20px;text-align:center;font-size:22px;color:var(--blue);border-bottom:1px solid #222;font-weight:bold;}
.container{display:flex;flex-wrap:wrap;justify-content:center;padding:10px;max-width:500px;margin:auto;}
.card{background:var(--card);margin:8px;padding:15px;border-radius:18px;width:140px;text-align:center;}
.card span{font-size:11px;color:var(--gray);}
.card b{font-size:22px;display:block;margin-top:8px;}
.full{width:100%;max-width:316px;margin-top:15px;}
.alarm-active{background:var(--red);box-shadow:0 0 20px var(--red);}
.alarm-normal{background:var(--green);}
.btn{display:block;margin:20px auto;padding:16px;width:90%;max-width:320px;border-radius:16px;font-size:16px;font-weight:bold;border:none;color:white;cursor:pointer;}
.btn-on{background:var(--red);}
.btn-off{background:var(--blue);}
.settings-btn{background:transparent;color:var(--blue);border:1px solid var(--blue);padding:8px 16px;border-radius:10px;cursor:pointer;margin-top:10px;}

.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);}
.modal-content{background:var(--card);margin:15% auto;padding:25px;border-radius:25px;width:80%;max-width:320px;border:1px solid #333;}
.input-group{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
input{background:#2c2c2e;border:1px solid #3a3a3c;color:white;padding:10px;border-radius:10px;width:60px;text-align:center;font-size:16px;}
.save-btn{background:var(--green);width:100%;padding:12px;border-radius:12px;border:none;color:white;font-weight:bold;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">SMART DEPO PANEL</div>

<div class="container">
<div class="card"><span>SICAKLIK</span><b id="temp">--</b></div>
<div class="card"><span>NEM</span><b id="hum">--</b></div>
<div class="card"><span>MESAFE</span><b id="dist">--</b></div>
<div class="card"><span>KAPI</span><b id="door">--</b></div>

<div id="alarmBox" class="card full alarm-normal">Bağlanıyor...</div>
<button onclick="toggleModal(true)" class="settings-btn">⚙️ Eşik Ayarları</button>
</div>

<button id="alarmBtn" class="btn btn-off">Alarmı Aç</button>

<div id="modal" class="modal">
<div class="modal-content">
<h3 style="margin-top:0;color:var(--blue)">Eşik Değerleri</h3>
<div class="input-group"><span>Sıcaklık</span><input type="number" id="limT"></div>
<div class="input-group"><span>Nem</span><input type="number" id="limH"></div>
<div class="input-group"><span>Mesafe</span><input type="number" id="limD"></div>
<button id="saveBtn" class="save-btn">Kaydet</button>
<button onclick="toggleModal(false)" style="background:none;border:none;color:var(--gray);margin-top:15px;">İptal</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyCm18AovKTAw0KB03ncpGaZFq4Uzhb8Lxc",
 authDomain: "smartdepo-1589d.firebaseapp.com",
 databaseURL: "https://smartdepo-1589d-default-rtdb.firebaseio.com",
 projectId: "smartdepo-1589d",
 storageBucket: "smartdepo-1589d.appspot.com",
 messagingSenderId: "159218413152",
 appId: "1:159218413152:web:10df562752247ec8a0dd05"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const sensorRef = ref(db, 'sensordata');
const alarmRef = ref(db, 'alarm');
const configRef = ref(db, 'config');

onValue(sensorRef, (snapshot) => {
 const data = snapshot.val();
 if(!data) return;

 document.getElementById("temp").innerText = data.t + " °C";
 document.getElementById("hum").innerText = data.h + " %";
 document.getElementById("dist").innerText = data.d + " cm";
 document.getElementById("door").innerText = data.k ? "AÇIK" : "KAPALI";

 const box = document.getElementById("alarmBox");
 const btn = document.getElementById("alarmBtn");

 if(data.a){
   box.innerText="!!! ALARM AKTİF !!!";
   box.className="card full alarm-active";
 }else{
   box.innerText="DURUM NORMAL";
   box.className="card full alarm-normal";
 }

 btn.innerText = data.e ? "Alarmı Kapat" : "Alarmı Aç";
 btn.className = data.e ? "btn btn-on" : "btn btn-off";
});

onValue(configRef, (snapshot) => {
 const config = snapshot.val();
 if(!config) return;

 document.getElementById("limT").value = config.temp || 30;
 document.getElementById("limH").value = config.hum || 60;
 document.getElementById("limD").value = config.dist || 20;
});

document.getElementById("alarmBtn").addEventListener("click", async () => {
 const snap = await get(alarmRef);
 const current = snap.val();
 await set(alarmRef, !current);
});

document.getElementById("saveBtn").addEventListener("click", async () => {
 const t = parseInt(document.getElementById("limT").value);
 const h = parseInt(document.getElementById("limH").value);
 const d = parseInt(document.getElementById("limD").value);

 await update(configRef, { temp: t, hum: h, dist: d });
 alert("Limitler güncellendi.");
 toggleModal(false);
});

window.toggleModal = (show) => {
 document.getElementById("modal").style.display = show ? "block" : "none";
};
</script>

</body>
</html>
